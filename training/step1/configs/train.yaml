run_name: speech-qwen3-8b
output_dir: /path/to/packed_output
seed: 1337

devices: 8
num_nodes: 1
precision: bf16-mixed
log_every_n_steps: 10
val_every_n_steps: 1000
save_every_n_steps: 1000
max_steps: 20000
resume_from: null

model:
  pretrained_name_or_path: /path/to/local/Qwen3-8B
  attn_implementation: sdpa
  trust_remote_code: false
  use_gradient_checkpointing: true

data:
  num_workers: 8
  global_batch_size: 64
  micro_batch_size: 1
  max_length: 4096
  pad_to_multiple_of: 8
  seed: 1337
  packed_train_sources:
    - name: commonvoice
      path: /path/to/packed_output/commonvoice_train/train/*.tar
      weight: 0.15
      shuffle_buffer: 2000
    - name: covost
      path: /path/to/packed_output/covost_train/train/*.tar
      weight: 0.10
      shuffle_buffer: 2000
    - name: gigaspeech
      path: /path/to/packed_output/gigaspeech_xl/train/*.tar
      weight: 0.40
      shuffle_buffer: 5000
    - name: spoken_squad
      path: /path/to/packed_output/spoken_squad_train/train/*.tar
      weight: 0.10
      shuffle_buffer: 1000
    - name: ultrachat
      path: /path/to/packed_output/ultrachat_train/train/*.tar
      weight: 0.25
      shuffle_buffer: 3000
  packed_val_sources:
    - name: commonvoice_dev
      path: /path/to/packed_output/commonvoice_train/dev/*.tar
      weight: 1.0
      shuffle_buffer: 1

speech:
  num_codebooks: 8
  speech_codebook_size: 2048

optim:
  lr: 2.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0
  warmup_steps: 500
  total_steps: 20000
  min_lr_ratio: 0.1

fsdp:
  sharding_strategy: FULL_SHARD
  state_dict_type: sharded
  limit_all_gathers: true
  cpu_offload: false
  activation_checkpointing: true
  param_dtype: bfloat16
  reduce_dtype: bfloat16
  buffer_dtype: bfloat16