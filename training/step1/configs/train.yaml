run_name: qwen3_8b_step1
seed: 42

model:
  pretrained_name_or_path: /lustre/fsmisc/dataset/HuggingFace_Models/Qwen/Qwen3-8B
  trust_remote_code: False
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16 # change in fabric as well
  num_codebooks: 4
  speech_codebook_size: 2048
  pad_to_multiple_of: 8
  gradient_checkpointing: True

training:
  max_steps: 200000
  global_batch_size: 256
  per_device_train_batch_size: 1
  per_device_val_batch_size: 1
  max_length: 32000
  grad_clip_norm: 1.0
  log_every_n_steps: 10
  val_every_n_steps: 1000
  ckpt_every_n_steps: 2000
  max_val_batches: 200
  num_workers: 4
  prefetch_factor: 2
  pin_memory: True

optimizer:
  lr: 1.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  name: cosine
  warmup_steps: 2000
  min_lr_ratio: 0.1

fabric:
  accelerator: cuda
  precision: bf16-mixed
  strategy: fsdp  # Only supports fsdp right now
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: sharded
  fsdp_limit_all_gathers: True
  fsdp_cpu_offload: False
  fsdp_use_orig_params: True
  fsdp_min_num_params: 10000000

logging:
  tensor_board_dir: /lustre/fsn1/projects/rech/bgp/ucm29gh/logs/step1
  ckpt_dir: /lustre/fsn1/projects/rech/bgp/ucm29gh/checkpoints/step1

curriculum:
  enabled: true
  update_every_steps: 5000

data:
  train_mix:
    - name: gigaspeech
      start_weight: 0.35
      end_weight: 0.3
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/gigaspeech/train

    - name: commonvoice
      start_weight: 0.25
      end_weight: 0.15
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/commonvoice/train

    - name: covost2
      start_weight: 0.0
      end_weight: 0.2
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/covost2/train

    - name: spoken_squad
      start_weight: 0.0
      end_weight: 0.25
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/spoken_squad/train

    - name: ultrachat_200k
      start_weight: 0.4
      end_weight: 0.1
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/ultrachat_200k/train

  val_sets:
    - name: commonvoice_dev
      max_samples: 1000
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/commonvoice/dev

    - name: covost2_dev
      max_samples: 1000
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/covost2/dev

    - name: gigaspeech_dev
      max_samples: 1000
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/gigaspeech/dev

    - name: spoken_squad_dev
      max_samples: 1000
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_4/spoken_squad/dev

    - name: ultrachat_200k_test
      max_samples: 1000
      urls:
        - /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/ultrachat_200k/test

resume_from: null