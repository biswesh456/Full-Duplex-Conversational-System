tokenizer_name: /lustre/fsmisc/dataset/HuggingFace_Models/Qwen/Qwen3-8B
num_codebooks: 4
speech_codebook_size: 2048
trust_remote_code: false

datasets:
  - name: commonvoice_train_asr
    split: train
    urls: /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/commonvoice_22/webdataset/codebook_{num_codebooks}/train/asr
    output_urls: /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/speech_qwen_preprocessed/codebook_{num_codebooks}/commonvoice_asr/train

  - name: commonvoice_dev_asr
    split: dev
    urls: /lustre/fsn1/projects/rech/bgp/ucm29gh/dataset/commonvoice_22/webdataset/codebook_{num_codebooks}/dev/asr
